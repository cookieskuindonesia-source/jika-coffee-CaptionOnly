<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jika Coffee - Internal Caption AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { coffeeOrange: '#F97316', coffeeDark: '#1F2937' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-orange-100">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-orange-100 text-coffeeOrange rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-robot"></i>
            </div>
            <h2 class="text-3xl font-black text-coffeeDark italic">Jika Caption Generator AI</h2>
            <p class="text-gray-500 text-sm mt-2">Internal Tool — Tinggal Pakai untuk Tim Marketing</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-coffeeDark mb-2">Nama Kopi / Produk</label>
                <input type="text" id="aiProductName" placeholder="Contoh: Arabica Aceh Gayo atau Promo Diskon Capuccino" class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-coffeeOrange focus:bg-white focus:outline-none transition text-sm font-medium">
            </div>

            <div>
                <label class="block text-sm font-bold text-coffeeDark mb-2">Gaya Bahasa / Tone Caption</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer border-2 border-gray-100 rounded-xl p-3 text-center block bg-gray-50 has-[:checked]:border-coffeeOrange has-[:checked]:bg-orange-50 transition">
                        <input type="radio" name="aiTone" value="Estetik, Senja, Filosofis" checked class="hidden">
                        <span class="text-xs font-bold text-gray-700 block">🍂 Estetik</span>
                    </label>
                    <label class="cursor-pointer border-2 border-gray-100 rounded-xl p-3 text-center block bg-gray-50 has-[:checked]:border-coffeeOrange has-[:checked]:bg-orange-50 transition">
                        <input type="radio" name="aiTone" value="Semangat, Promosi Hard Selling, Seruan Aksi" class="hidden">
                        <span class="text-xs font-bold text-gray-700 block">💥 Jualan/Diskon</span>
                    </label>
                    <label class="cursor-pointer border-2 border-gray-100 rounded-xl p-3 text-center block bg-gray-50 has-[:checked]:border-coffeeOrange has-[:checked]:bg-orange-50 transition">
                        <input type="radio" name="aiTone" value="Santai, Gaul, ala Anak Muda Jaksel" class="hidden">
                        <span class="text-xs font-bold text-gray-700 block">🛹 Santai/Gaul</span>
                    </label>
                </div>
            </div>

            <button onclick="generateCaption()" id="btnGenerate" class="w-full bg-coffeeOrange text-white py-4 rounded-xl font-bold text-md shadow-lg shadow-orange-200 flex items-center justify-center gap-2 hover:scale-[1.01] transition duration-200">
                <i class="fas fa-magic"></i> Buat Caption Otomatis
            </button>
        </div>

        <div id="aiResultBox" class="mt-8 pt-6 border-t border-dashed border-gray-200 hidden">
            <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-bold text-coffeeDark">Hasil Caption:</label>
                <span id="statusBadge" class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-green-100 text-green-700">Sukses</span>
            </div>
            <div class="relative bg-gray-50 rounded-2xl p-5 border border-gray-100">
                <p id="aiOutputText" class="text-gray-700 text-sm whitespace-pre-line leading-relaxed">Hasil teks akan muncul di sini...</p>
                <button onclick="copyAiCaption()" class="absolute top-3 right-3 bg-white border border-gray-200 text-gray-500 hover:text-coffeeOrange w-8 h-8 rounded-lg flex items-center justify-center shadow-sm transition" title="Salin Teks">
                    <i id="copyIcon" class="far fa-copy text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generateCaption() {
            const productName = document.getElementById('aiProductName').value.trim();
            const tone = document.querySelector('input[name="aiTone"]:checked').value;
            const btn = document.getElementById('btnGenerate');
            const resultBox = document.getElementById('aiResultBox');
            const outputText = document.getElementById('aiOutputText');
            const statusBadge = document.getElementById('statusBadge');

            if (!productName) {
                alert("Ketik dulu nama produk atau promonya ya!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Sedang Meracik...';
            resultBox.classList.remove('hidden');
            statusBadge.className = "text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-yellow-100 text-yellow-700";
            statusBadge.innerText = "Berpikir...";
            outputText.innerText = "Tunggu sebentar, Gemini sedang menulis caption terbaikmu...";

            try {
                // Memanggil serverless function Vercel di folder /api/generate
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productName, tone })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Terjadi kesalahan sistem.');
                }

                statusBadge.className = "text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-green-100 text-green-700";
                statusBadge.innerText = "Sukses";
                outputText.innerText = data.caption;

            } catch (error) {
                console.error(error);
                statusBadge.className = "text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-red-100 text-red-700";
                statusBadge.innerText = "Gagal";
                outputText.innerText = "Aduh! Gagal mengambil data.\n\nPesan Error: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> Buat Caption Otomatis';
            }
        }

        function copyAiCaption() {
            const text = document.getElementById('aiOutputText').innerText;
            navigator.clipboard.writeText(text);
            const icon = document.getElementById('copyIcon');
            icon.className = "fas fa-check text-green-500";
            setTimeout(() => { icon.className = "far fa-copy text-sm"; }, 2000);
        }
    </script>
</body>
</html>
